<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Score how well a resume fits a job posting. A React + TypeScript UI over an agentic Claude loop grounded by a custom MCP server."
    />
    <meta name="theme-color" content="#f6f1ea" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#20211f" media="(prefers-color-scheme: dark)" />
    <title>Job-Fit Analyzer</title>

    <!-- Set theme before first paint to avoid a flash. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("theme");
          var dark = saved ? saved === "dark" : matchMedia("(prefers-color-scheme: dark)").matches;
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;450;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
